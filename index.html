<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piggy Rental - เว็บปล่อยเช่าอัตโนมัติ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="brand-name">Piggy Rental</div>
        <div class="header-icons">
            <button class="icon-btn"><i class="fas fa-search"></i></button>
            <button class="icon-btn"><i class="fas fa-sun"></i></button>
            <div class="user-avatar" id="userBtn" onclick="handleUserBtnClick()">
                <i class="fas fa-user"></i>
            </div> 
        </div>
    </header>

    <section class="stats-container">
        <div class="stat-card">
            <span class="stat-icon"><i class="fas fa-server"></i></span>
            <span class="stat-label">เว็บที่กำลังใช้งาน</span>
            <div class="stat-value" id="activeWebs">0</div>
            <span class="stat-unit">เว็บไซต์</span>
        </div>
        <div class="stat-card">
            <span class="stat-icon"><i class="fas fa-history"></i></span>
            <span class="stat-label">รายการเช่าทั้งหมด</span>
            <div class="stat-value" id="totalRentals">0</div>
            <span class="stat-unit">รายการ</span>
        </div>
    </section>

    <div class="modal-backdrop" id="loginModal">
        <div class="login-card">
            <h2 class="login-title">เข้าสู่ระบบ</h2>
            <p class="login-subtitle">กรุณาเข้าสู่ระบบผ่าน Google เพื่อใช้งานต่อ</p>
            
            <button class="btn-google" id="googleLoginBtn">
                <i class="fab fa-google"></i> เข้าสู่ระบบด้วย Google
            </button>

            <div class="divider">หรือ</div>
            
            <p class="guest-text">ยังไม่ต้องการล็อกอิน? <a href="#" class="guest-link" onclick="closeModal()">ดูหน้าเว็บตัวอย่าง</a></p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // 1. วาง Firebase Config ของคุณหมวยตรงนี้ (ได้จาก Firebase Console)
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT_ID.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        // Elements
        const loginModal = document.getElementById('loginModal');
        const googleLoginBtn = document.getElementById('googleLoginBtn');
        const userBtn = document.getElementById('userBtn');

        // --- ฟังก์ชันหลัก ---

        // A. ติดตามสถานะผู้ใช้ (ล็อกอินอยู่หรือไม่)
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                // ผู้ใช้ล็อกอินแล้ว
                console.log("Logged in:", user.displayName);
                closeModal();
                
                // แสดงรูปโปรไฟล์ Google
                userBtn.innerHTML = `<img src="${user.photoURL}" style="width:100%; height:100%; border-radius:50%;" />`;
                
                // เช็ค/สร้างข้อมูลผู้ใช้ใน Firestore
                await checkAndCreateUser(user);
                
            } else {
                // ผู้ใช้ยังไม่ได้ล็อกอิน
                userBtn.innerHTML = `<i class="fas fa-user"></i>`;
                openModal();
            }
        });

        // B. ฟังก์ชันล็อกอินด้วย Google (ใช้งานได้จริง)
        googleLoginBtn.addEventListener('click', () => {
            signInWithPopup(auth, provider)
                .then((result) => {
                    console.log("Sign-in success");
                }).catch((error) => {
                    console.error("Sign-in error:", error.message);
                    alert("เกิดข้อผิดพลาดในการล็อกอิน");
                });
        });

        // C. เช็ค/สร้างข้อมูลผู้ใช้ใน Firestore และจัดการยศ (Admin/Customer)
        async function checkAndCreateUser(user) {
            const userRef = doc(db, "users", user.uid);
            const userSnap = await getDoc(userRef);

            if (!userSnap.exists()) {
                // ถ้ายังไม่มีข้อมูล ให้สร้างใหม่ (เริ่มต้นเป็น customer)
                await setDoc(userRef, {
                    uid: user.uid,
                    name: user.displayName,
                    email: user.email,
                    photoURL: user.photoURL,
                    role: 'customer', // แอดมินต้องมาแก้ใน DB เองทีหลัง
                    balance: 0,
                    createdAt: new Date()
                });
                console.log("Created new user in Firestore");
            } else {
                console.log("User already exists in Firestore");
                const userData = userSnap.data();
                // ถ้าเป็นแอดมิน ให้ทำชื่อสีทอง (ตามบรีฟแรก)
                if(userData.role === 'admin') {
                   // โค้ดสำหรับแสดงผลชื่อแอดมิน (จะทำในหน้าโปรไฟล์)
                }
            }
        }

        // --- ฟังก์ชัน UI ทั่วไป ---
        function openModal() { loginModal.classList.add('show'); }
        window.closeModal = function() { loginModal.classList.remove('show'); } // ทำให้เรียกจาก HTML ได้

        window.handleUserBtnClick = function() {
            if(auth.currentUser) {
                // ถ้าล็อกอินอยู่ กดแล้วไปหน้าโปรไฟล์ (ยังไม่ได้ทำ) หรือ Log out
                if(confirm("ต้องการออกจากระบบหรือไม่?")) {
                    signOut(auth);
                }
            } else {
                // ถ้าไม่ได้ล็อกอิน กดแล้วเปิดหน้าล็อกอิน
                openModal();
            }
        }
    </script>
</body>
</html>
