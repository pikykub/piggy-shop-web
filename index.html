<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ | แพลตฟอร์มปล่อยเช่าเว็บ</title>
    <style>
        /* ตั้งค่าสีหลัก ดำ-ทอง */
        :root {
            --bg-color: #0d0d0d;
            --container-bg: #1a1a1a;
            --gold-primary: #D4AF37;
            --gold-hover: #b5952f;
            --text-main: #ffffff;
            --text-muted: #888888;
            --input-bg: #262626;
        }

        * {
            box-sizing: border-box;
            font-family: 'Prompt', sans-serif; /* แนะนำให้ import ฟอนต์ Prompt จาก Google Fonts */
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .login-box {
            background-color: var(--container-bg);
            width: 100%;
            max-width: 400px;
            padding: 40px 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(212, 175, 55, 0.1);
            border: 1px solid #333;
        }

        .header-text {
            text-align: center;
            margin-bottom: 30px;
        }

        .header-text h2 {
            margin: 0 0 10px 0;
            color: var(--text-main);
        }

        .header-text p {
            margin: 0;
            color: var(--text-muted);
            font-size: 0.9em;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9em;
            color: var(--text-muted);
        }

        .input-group input {
            width: 100%;
            padding: 12px 15px;
            background-color: var(--input-bg);
            border: 1px solid #444;
            border-radius: 8px;
            color: var(--text-main);
            outline: none;
            transition: border 0.3s;
        }

        .input-group input:focus {
            border-color: var(--gold-primary);
        }

        .forgot-password {
            display: block;
            text-align: right;
            color: var(--text-muted);
            font-size: 0.85em;
            text-decoration: none;
            margin-bottom: 20px;
        }

        .forgot-password:hover {
            color: var(--gold-primary);
        }

        .btn-gold {
            width: 100%;
            padding: 12px;
            background-color: var(--gold-primary);
            color: #000;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1em;
            cursor: pointer;
            transition: background 0.3s;
            margin-bottom: 20px;
        }

        .btn-gold:hover {
            background-color: var(--gold-hover);
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 20px;
            font-size: 0.85em;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #444;
        }

        .divider::before { margin-right: 10px; }
        .divider::after { margin-left: 10px; }

        .btn-google {
            width: 100%;
            padding: 12px;
            background-color: transparent;
            color: var(--text-main);
            border: 1px solid #444;
            border-radius: 8px;
            font-weight: normal;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: border 0.3s, background 0.3s;
        }

        .btn-google:hover {
            background-color: rgba(255, 255, 255, 0.05);
            border-color: var(--text-muted);
        }

        .register-link {
            text-align: center;
            margin-top: 20px;
            font-size: 0.9em;
            color: var(--text-muted);
        }

        .register-link a {
            color: var(--text-main);
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="login-box">
        <div class="header-text">
            <h2>เข้าสู่ระบบ</h2>
            <p>กรุณาเข้าสู่ระบบเพื่อใช้งานต่อ</p>
        </div>

        <div class="input-group">
            <label>ชื่อผู้ใช้ หรือ อีเมล</label>
            <input type="text" placeholder="username หรือ user@gmail.com">
        </div>

        <div class="input-group">
            <label>รหัสผ่าน</label>
            <input type="password" placeholder="password">
        </div>

        <a href="#" class="forgot-password">ลืมรหัสผ่าน?</a>

        <button class="btn-gold">เข้าสู่ระบบ</button>

        <div class="divider">หรือ</div>

        <button class="btn-google">
            G เข้าสู่ระบบด้วย Google
        </button>

        <div class="register-link">
            ยังไม่มีบัญชี? <a href="#">สมัครสมาชิก</a>
        </div>
    </div>

</body>
</html>
