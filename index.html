<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>PeachWeb</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header class="navbar">

<div class="logo">
PeachWeb
</div>

<nav>

<button class="nav-btn">Login</button>
<button class="nav-btn">Register</button>

</nav>

</header>


<section class="hero">

<h1>Website Rental Platform</h1>

<p>
Create and manage your own website instantly with automated deployment.
</p>

<button class="primary-btn">
Start Now
</button>

</section>


<section class="stats">

<div class="stat-card">

<h3>Total Users</h3>
<h2 id="userCount">0</h2>

</div>

<div class="stat-card">

<h3>Active Websites</h3>
<h2 id="siteCount">0</h2>

</div>

</section>


<section class="plans">

<h2>Rental Plans</h2>

<div class="plan-grid">

<div class="plan-card">

<h3>Starter</h3>

<p>7 Days</p>

<div class="price">
49 THB
</div>

<button class="primary-btn">
Rent Website
</button>

</div>


<div class="plan-card">

<h3>Standard</h3>

<p>1 Month</p>

<div class="price">
149 THB
</div>

<button class="primary-btn">
Rent Website
</button>

</div>


<div class="plan-card">

<h3>Professional</h3>

<p>3 Months</p>

<div class="price">
349 THB
</div>

<button class="primary-btn">
Rent Website
</button>

</div>

</div>

</section>

<script src="app.js"></script>

</body>
</html>
